# H2 shared database — all domains share one DB (anti-pattern)
spring.datasource.url=jdbc:h2:mem:monolithdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=9090

# LEGACY WORKAROUND: Circular dependency between CustomerService <-> PaymentService
# This flag is REMOVED in Spring Boot 3.x — migration will force decoupling
spring.main.allow-circular-references=true
