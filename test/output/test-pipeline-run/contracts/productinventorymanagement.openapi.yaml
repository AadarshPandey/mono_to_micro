openapi: 3.1.0
info:
  title: Product Inventory Management Service
  version: 1.0.0
  description: API for managing product inventory, including creating, retrieving, updating product details, and managing stock levels.
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://product-inventory-service:8080
    description: Internal service endpoint for Product Inventory Management
x-internal-classes:
  - com.enterprise.monolith.model.Product
  - com.enterprise.monolith.service.InventoryService
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Checks the health and availability of the Product Inventory Management service.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products:
    get:
      summary: Get all products
      description: Retrieves a list of all products currently in the inventory.
      operationId: getAllProducts
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a new product
      description: Adds a new product to the inventory with its initial details and stock quantity.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/low-stock:
    get:
      summary: Get products with low stock
      description: Retrieves a list of products whose current stock quantity is at or below their defined reorder threshold.
      operationId: getLowStockProducts
      responses:
        '200':
          description: A list of products with low stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        description: The unique identifier of the product.
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      summary: Get product by ID
      description: Retrieves the detailed information for a specific product using its unique ID.
      operationId: getProductById
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Update an existing product
      description: Updates the details of an existing product (e.g., name, category, price, reorder threshold). Stock quantity should be managed via dedicated reserve/release endpoints.
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete a product
      description: Deletes a product from the inventory using its unique ID.
      operationId: deleteProduct
      responses:
        '204':
          description: Product deleted successfully (No Content)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{productId}/reserve:
    post:
      summary: Reserve stock for a product
      description: Decreases the available stock quantity for a product by the specified amount, typically for fulfilling an order.
      operationId: reserveProductStock
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product for which to reserve stock.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveStockRequest'
      responses:
        '200':
          description: Stock reserved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Stock reserved successfully.
                  currentStock:
                    type: integer
                    format: int32
                    description: The updated stock quantity after reservation.
        '400':
          description: Bad Request (e.g., insufficient stock, invalid quantity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{productId}/release:
    post:
      summary: Release stock for a product
      description: Increases the available stock quantity for a product by the specified amount, typically for order cancellations or returns.
      operationId: releaseProductStock
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product for which to release stock.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseStockRequest'
      responses:
        '200':
          description: Stock released successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Stock released successfully.
                  currentStock:
                    type: integer
                    format: int32
                    description: The updated stock quantity after release.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    Product:
      type: object
      description: Represents a product in the inventory.
      required:
        - id
        - name
        - price
        - stockQuantity
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the product.
          readOnly: true
          example: 101
        name:
          type: string
          description: The name of the product.
          example: "Laptop Pro X"
        category:
          type: string
          description: The category the product belongs to (e.g., "Electronics", "Books").
          nullable: true
          example: "Electronics"
        price:
          type: number
          format: double
          description: The price of the product.
          minimum: 0
          example: 1299.99
        stockQuantity:
          type: integer
          format: int32
          description: The current quantity of the product in stock.
          minimum: 0
          example: 50
        reorderThreshold:
          type: integer
          format: int32
          description: The stock level at which a reorder should be triggered.
          minimum: 0
          example: 10

    ProductCreateRequest:
      type: object
      description: Request body for creating a new product.
      required:
        - name
        - price
        - stock
      properties:
        name:
          type: string
          description: The name of the product.
          example: "Smartphone Ultra"
        category:
          type: string
          description: The category the product belongs to.
          nullable: true
          example: "Electronics"
        price:
          type: number
          format: double
          description: The initial price of the product.
          minimum: 0
          example: 799.00
        stock:
          type: integer
          format: int32
          description: The initial stock quantity for the product.
          minimum: 0
          example: 100

    ProductUpdateRequest:
      type: object
      description: Request body for updating an existing product's details (excluding stock quantity).
      properties:
        name:
          type: string
          description: The updated name of the product.
          example: "Laptop Pro X (2023 Model)"
        category:
          type: string
          description: The updated category of the product.
          nullable: true
          example: "Computers"
        price:
          type: number
          format: double
          description: The updated price of the product.
          minimum: 0
          example: 1399.99
        reorderThreshold:
          type: integer
          format: int32
          description: The updated reorder threshold for the product.
          minimum: 0
          example: 15

    ReserveStockRequest:
      type: object
      description: Request body for reserving stock for a product.
      required:
        - quantity
      properties:
        quantity:
          type: integer
          format: int32
          description: The quantity of stock to reserve.
          minimum: 1
          example: 5

    ReleaseStockRequest:
      type: object
      description: Request body for releasing stock for a product.
      required:
        - quantity
      properties:
        quantity:
          type: integer
          format: int32
          description: The quantity of stock to release.
          minimum: 1
          example: 3

    ErrorResponse:
      type: object
      description: Standard error response format for API errors.
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: The time the error occurred.
          example: "2023-10-27T10:30:00Z"
        status:
          type: integer
          format: int32
          description: The HTTP status code.
          example: 400
        error:
          type: string
          description: A brief error type.
          example: "Bad Request"
        message:
          type: string
          description: A detailed error message.
          example: "Insufficient stock for product ID 101. Requested 5, available 2."
        path:
          type: string
          description: The request path that caused the error.
          example: "/products/101/reserve"

  responses:
    BadRequest:
      description: Bad Request (e.g., invalid input, insufficient stock, invalid quantity)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found (e.g., product ID does not exist)
      content:
        application/json:
          schema:
            $ref