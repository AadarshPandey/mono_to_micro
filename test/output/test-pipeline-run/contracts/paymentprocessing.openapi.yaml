openapi: 3.1.0
info:
  title: Payment Processing Service API
  version: 1.0.0
  description: API for processing payments, managing refunds, and retrieving payment-related statistics.
x-internal-classes:
  - com.enterprise.monolith.model.Payment
  - com.enterprise.monolith.service.PaymentService
servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Checks the health and availability of the Payment Processing service.
      responses:
        200:
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
        500:
          description: Service is unhealthy
  /payments:
    get:
      summary: Get all payments or filter by customer/order
      description: Retrieve a list of all payments, optionally filtered by customer ID or order ID.
      parameters:
        - in: query
          name: customerId
          schema:
            type: integer
            format: int64
          description: ID of the customer to filter payments by.
          required: false
        - in: query
          name: orderId
          schema:
            type: integer
            format: int64
          description: ID of the order to filter payments by.
          required: false
      responses:
        200:
          description: A list of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        500:
          description: Internal server error
    post:
      summary: Process a new payment
      description: Initiates and processes a new payment for a given order. This endpoint interacts with CustomerManagement for credit checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        201:
          description: Payment successfully processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        400:
          description: Invalid request payload or payment method
        402:
          description: Payment required (e.g., credit check failed via CustomerManagement)
        404:
          description: Order or Customer not found (cross-domain dependency)
        500:
          description: Internal server error or payment gateway failure
  /payments/{paymentId}:
    get:
      summary: Get a payment by ID
      description: Retrieve details of a specific payment using its unique ID.
      parameters:
        - in: path
          name: paymentId
          schema:
            type: integer
            format: int64
          required: true
          description: Unique ID of the payment.
      responses:
        200:
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        404:
          description: Payment not found
        500:
          description: Internal server error
    put:
      summary: Update a payment
      description: Update details of an existing payment. This can be used for status updates (e.g., manual reconciliation) or transaction reference changes.
      parameters:
        - in: path
          name: paymentId
          schema:
            type: integer
            format: int64
          required: true
          description: Unique ID of the payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdate'
      responses:
        200:
          description: Payment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        400:
          description: Invalid request payload
        404:
          description: Payment not found
        500:
          description: Internal server error
  /payments/refunds:
    post:
      summary: Refund payments for an order
      description: Initiates a refund for all completed payments associated with a specific order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: integer
                  format: int64
                  description: The ID of the order for which payments should be refunded.
      responses:
        200:
          description: Payments for the order successfully refunded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Refund initiated for order 123"
        404:
          description: Order not found or no completed payments found for order
        500:
          description: Internal server error or refund processing failure
  /payments/successful/count:
    get:
      summary: Count successful payments for a customer
      description: Retrieves the total number of successful payments made by a specific customer. This endpoint is often called by the CustomerManagement service.
      parameters:
        - in: query
          name: customerId
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the customer.
      responses:
        200:
          description: Count of successful payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerId:
                    type: integer
                    format: int64
                  count:
                    type: integer
                    format: int64
        400:
          description: Missing customerId parameter
        404:
          description: Customer not found (cross-domain dependency)
        500:
          description: Internal server error
  /payments/revenue/total:
    get:
      summary: Get total revenue
      description: Retrieves the total revenue generated from all completed payments.
      responses:
        200:
          description: Total revenue
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRevenue:
                    type: number
                    format: double
        500:
          description: Internal server error

components:
  schemas:
    Payment:
      type: object
      description: Represents a payment transaction.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the payment.
          readOnly: true
        orderId:
          type: integer
          format: int64
          description: ID of the associated order.
        customerId:
          type: integer
          format: int64
          description: ID of the customer who made the payment.
        amount:
          type: number
          format: double
          description: The amount of the payment.
        status:
          $ref: '#/components/schemas/PaymentStatus'
        method:
          $ref: '#/components/schemas/PaymentMethod'
        transactionRef:
          type: string
          description: Reference string for the payment transaction (e.g., from gateway).
        processedAt:
          type: string
          format: date-time
          description: Timestamp when the payment was processed.
          readOnly: true
      required:
        - orderId
        - customerId
        - amount
        - status
        - method

    PaymentRequest:
      type: object
      description: Request body for processing a new payment.
      properties:
        orderId:
          type: integer
          format: int64
          description: The ID of the order for which payment is being made.
        customerId:
          type: integer
          format: int64
          description: The ID of the customer making the payment.
        amount:
          type: number
          format: double
          description: The total amount of the payment.
        method:
          $ref: '#/components/schemas/PaymentMethod'
      required:
        - orderId
        - customerId
        - amount
        - method

    PaymentUpdate:
      type: object
      description: Request body for updating an existing payment.
      properties:
        status:
          $ref: '#/components/schemas/PaymentStatus'
          description: The new status of the payment.
        transactionRef:
          type: string
          description: Updated transaction reference.
      minProperties: 1 # At least one field must be present for update

    PaymentStatus:
      type: string
      description: The current status of the payment.
      enum:
        - PENDING
        - COMPLETED
        - FAILED
        - REFUNDED

    PaymentMethod:
      type: string
      description: The method used for the payment.
      enum:
        - CREDIT_CARD
        - DEBIT_CARD
        - PAYPAL
        - BANK_TRANSFER
        - APPLE_PAY
        - GOOGLE_PAY