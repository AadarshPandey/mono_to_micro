openapi: 3.1.0
info:
  title: Order Management Service API
  version: 1.0.0
  description: API for managing customer orders, including creation, retrieval, and status updates.
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: http://order-management-service:8080/api/v1
    description: Production server
x-internal-classes:
  - com.enterprise.monolith.model.Order
  - com.enterprise.monolith.model.OrderItem
  - com.enterprise.monolith.service.OrderService
  - com.enterprise.monolith.controller.OrderController
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Checks the health and availability of the Order Management service.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
  /orders:
    get:
      summary: Get a list of orders
      description: Retrieve orders, optionally filtered by customer ID or status.
      operationId: getOrders
      parameters:
        - name: customerId
          in: query
          description: ID of the customer to filter orders by.
          required: false
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          description: Status of the orders to filter by.
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: A list of orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a new order
      description: Creates a new order for a customer with specified items and shipping details.
      operationId: createOrder
      requestBody:
        description: Order creation request payload.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Customer or product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}:
    get:
      summary: Get an order by ID
      description: Retrieve a single order by its unique identifier.
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          description: ID of the order to retrieve.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}/confirm-payment:
    put:
      summary: Confirm payment for an order
      description: Updates an order's status to PAID after successful payment processing.
      operationId: confirmOrderPayment
      parameters:
        - name: orderId
          in: path
          description: ID of the order to confirm payment for.
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Payment confirmation details.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentRequest'
      responses:
        '200':
          description: Order payment confirmed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /orders/{orderId}/cancel:
    put:
      summary: Cancel an order
      description: Cancels an existing order, releasing stock and potentially refunding payment.
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          description: ID of the order to cancel.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Cannot cancel order (e.g., already shipped/delivered).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    Order:
      type: object
      description: Represents a customer order.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the order.
          readOnly: true
        customer:
          $ref: 'http://customer-service:8080/api/v1/schemas/Customer'
          description: Details of the customer who placed the order.
        items:
          type: array
          description: List of items included in the order.
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: double
          description: Total monetary amount of the order.
          readOnly: true
        status:
          $ref: '#/components/schemas/OrderStatus'
          description: Current status of the order.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created.
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the order was last updated.
          readOnly: true
        shippingAddress:
          type: string
          description: Street address for shipping.
        shippingCity:
          type: string
          description: City for shipping.
        shippingZip:
          type: string
          description: Zip code for shipping.
      required:
        - customer
        - items
        - totalAmount
        - status
        - createdAt
        - shippingAddress
        - shippingCity
        - shippingZip
    OrderItem:
      type: object
      description: Represents an item within an order.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the order item.
          readOnly: true
        product:
          $ref: 'http://product-inventory-service:8080/api/v1/schemas/Product'
          description: Details of the product ordered.
        quantity:
          type: integer
          format: int32
          description: Quantity of the product ordered.
          minimum: 1
        priceAtOrder:
          type: number
          format: double
          description: Price of the product at the time of order.
          readOnly: true
      required:
        - product
        - quantity
        - priceAtOrder
    CreateOrderRequest:
      type: object
      description: Request body for creating a new order.
      properties:
        customerId:
          type: integer
          format: int64
          description: ID of the customer placing the order.
        itemRequests:
          type: array
          description: List of products and quantities to order.
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'
        shippingAddress:
          type: string
          description: Street address for shipping.
        shippingCity:
          type: string
          description: City for shipping.
        shippingZip:
          type: string
          description: Zip code for shipping.
      required:
        - customerId
        - itemRequests
        - shippingAddress
        - shippingCity
        - shippingZip
    CreateOrderItemRequest:
      type: object
      description: Details for a single item in an order creation request.
      properties:
        productId:
          type: integer
          format: int64
          description: ID of the product to include in the order.
        quantity:
          type: integer
          format: int32
          description: Quantity of the product.
          minimum: 1
      required:
        - productId
        - quantity
    ConfirmPaymentRequest:
      type: object
      description: Request body for confirming payment for an order.
      properties:
        paymentId:
          type: string
          description: Unique identifier for the payment transaction.
          example: "txn_123abc"
      required: